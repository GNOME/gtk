<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- transform-origin with fill-box (default) -->
  <rect x="20" y="20" width="60" height="60" fill="red"
        style="transform: rotate(45deg); transform-origin: 50% 50%; transform-box: fill-box"/>

  <!-- transform-origin with stroke-box -->
  <rect x="120" y="20" width="60" height="60" fill="green" stroke="black" stroke-width="4"
        style="transform: rotate(30deg); transform-origin: 50% 50%; transform-box: stroke-box"/>

  <!-- transform-origin with view-box -->
  <rect x="220" y="20" width="60" height="60" fill="blue"
        style="transform: scale(0.5); transform-origin: 50% 50%; transform-box: view-box"/>

  <!-- transform-origin with content-box -->
  <circle cx="50" cy="150" r="30" fill="purple"
          style="transform: rotate(60deg); transform-origin: 50% 50%; transform-box: content-box"/>

  <!-- transform-origin with scale -->
  <rect x="120" y="120" width="60" height="60" fill="orange"
        style="transform: scale(1.5); transform-origin: 0 0; transform-box: fill-box"/>
</svg>

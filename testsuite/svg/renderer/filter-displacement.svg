<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="displace">
      <feFlood flood-color="red" flood-opacity="0.5" result="map"/>
      <feDisplacementMap in="SourceGraphic" in2="map"
                         scale="20"
                         xChannelSelector="R"
                         yChannelSelector="G"/>
    </filter>
  </defs>
  <rect x="50" y="50" width="100" height="100" fill="blue" filter="url(#displace)"/>
</svg>

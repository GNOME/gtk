<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <!-- clipPath with objectBoundingBox units -->
    <clipPath id="clip1" clipPathUnits="objectBoundingBox">
      <circle cx="0.5" cy="0.5" r="0.5"/>
    </clipPath>

    <!-- clipPath with multiple shapes (forces mask path in renderer) -->
    <clipPath id="clip2">
      <rect x="120" y="10" width="40" height="80"/>
      <rect x="170" y="10" width="40" height="80"/>
    </clipPath>

    <!-- clipPath with transform (forces mask path) -->
    <clipPath id="clip3" transform="rotate(15)">
      <rect x="10" y="110" width="80" height="80"/>
    </clipPath>
  </defs>

  <rect x="10" y="10" width="80" height="80" fill="red" clip-path="url(#clip1)"/>
  <rect x="120" y="10" width="100" height="80" fill="green" clip-path="url(#clip2)"/>
  <rect x="10" y="110" width="80" height="80" fill="blue" clip-path="url(#clip3)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- clip-path with CSS path() syntax, nonzero fill rule -->
  <rect x="10" y="10" width="80" height="80" fill="red"
        style="clip-path: path(nonzero, 'M 0 0 L 80 0 L 80 80 L 0 80 Z M 20 20 L 20 60 L 60 60 L 60 20 Z')"/>

  <!-- clip-path with CSS path() syntax, evenodd fill rule -->
  <rect x="110" y="10" width="80" height="80" fill="green"
        style="clip-path: path(evenodd, 'M 0 0 L 80 0 L 80 80 L 0 80 Z M 20 20 L 20 60 L 60 60 L 60 20 Z')"/>

  <!-- clip-path with CSS path() syntax, no fill rule -->
  <rect x="210" y="10" width="80" height="80" fill="blue"
        style="clip-path: path('M 10 10 L 70 10 L 70 70 L 10 70 Z')"/>

  <!-- nested clip: clipPath on clipPath -->
  <defs>
    <clipPath id="outer-clip">
      <rect x="10" y="110" width="80" height="80"/>
    </clipPath>
  </defs>
  <rect x="10" y="110" width="80" height="80" fill="orange" clip-path="url(#outer-clip)"/>

  <!-- clip-rule evenodd -->
  <defs>
    <clipPath id="eo-clip" clip-rule="evenodd">
      <path d="M 120 120 L 180 120 L 180 180 L 120 180 Z M 140 140 L 140 160 L 160 160 L 160 140 Z"/>
    </clipPath>
  </defs>
  <rect x="110" y="110" width="80" height="80" fill="purple" clip-path="url(#eo-clip)"/>
</svg>

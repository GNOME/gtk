<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <!-- mask with objectBoundingBox content units -->
    <mask id="mask1" maskContentUnits="objectBoundingBox">
      <rect x="0" y="0" width="1" height="1" fill="white"/>
      <circle cx="0.5" cy="0.5" r="0.4" fill="black"/>
    </mask>

    <!-- mask with userSpaceOnUse content units and explicit bounds -->
    <mask id="mask2" maskContentUnits="userSpaceOnUse"
          x="0.1" y="0.1" width="0.8" height="0.8">
      <rect x="150" y="10" width="80" height="80" fill="white"/>
      <circle cx="190" cy="50" r="20" fill="black"/>
    </mask>

    <!-- mask with objectBoundingBox mask units -->
    <mask id="mask3" maskUnits="objectBoundingBox"
          maskContentUnits="objectBoundingBox"
          x="0" y="0" width="1" height="1">
      <rect x="0" y="0" width="1" height="1" fill="white" fill-opacity="0.5"/>
    </mask>
  </defs>

  <rect x="10" y="10" width="80" height="80" fill="red" mask="url(#mask1)"/>
  <rect x="150" y="10" width="80" height="80" fill="blue" mask="url(#mask2)"/>
  <rect x="10" y="110" width="80" height="80" fill="green" mask="url(#mask3)"/>
</svg>

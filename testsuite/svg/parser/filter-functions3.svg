<svg width='200' height='200'>
  <defs>
    <filter id='myfilter'>
      <feGaussianBlur stdDeviation='3'/>
    </filter>
  </defs>

  <!-- drop-shadow with color last, no blur radius -->
  <circle cx='10' cy='10' r='5' filter='drop-shadow(2px 4px blue)'/>

  <!-- drop-shadow via CSS style attribute -->
  <circle cx='20' cy='10' r='5' style='filter: drop-shadow(3px 5px 2px green)'/>

  <!-- url() via CSS style attribute -->
  <circle cx='30' cy='10' r='5' style='filter: url(#myfilter)'/>

  <!-- chained filters via CSS style attribute -->
  <circle cx='40' cy='10' r='5' style='filter: blur(2px) brightness(1.5)'/>

  <!-- none via CSS style attribute -->
  <circle cx='50' cy='10' r='5' style='filter: none'/>

  <!-- blur with length units via CSS style -->
  <circle cx='60' cy='10' r='5' style='filter: blur(3px)'/>

  <!-- hue-rotate with angle unit via CSS style -->
  <circle cx='70' cy='10' r='5' style='filter: hue-rotate(90deg)'/>

  <!-- multiple chained via CSS style -->
  <rect x='0' y='30' width='20' height='20'
        style='filter: grayscale(50%) contrast(150%) saturate(200%)'/>

  <!-- drop-shadow with full args via CSS style -->
  <rect x='30' y='30' width='20' height='20'
        style='filter: drop-shadow(1px 2px 3px red)'/>

  <!-- opacity percentage via CSS style -->
  <rect x='60' y='30' width='20' height='20'
        style='filter: opacity(75%)'/>

  <!-- drop-shadow with extra args -->
  <rect x='30' y='30' width='20' height='20'
        style='filter: drop-shadow(1px 2px 3px 4x red)'/>

  <!-- drop-shadow with too few args -->
  <rect x='30' y='30' width='20' height='20'
        style='filter: drop-shadow(1px)'/>
</svg>

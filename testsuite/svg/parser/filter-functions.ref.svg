<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        width='200'
        height='200'>
  <defs>
    <filter
            id='myfilter'>
      <feGaussianBlur
              stdDeviation='5'>
      </feGaussianBlur>
    </filter>
  </defs>
  <circle
          filter='blur(0)'
          cx='10'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='blur(10px)'
          cx='20'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='brightness(0.5)'
          cx='30'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='brightness(2)'
          cx='40'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='contrast(0)'
          cx='50'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='contrast(2)'
          cx='60'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='grayscale(0.5)'
          cx='70'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='invert(1)'
          cx='80'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='sepia(0.5)'
          cx='90'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='saturate(2)'
          cx='100'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='hue-rotate(90)'
          cx='110'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='hue-rotate(180)'
          cx='120'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='opacity(0.5)'
          cx='130'
          cy='10'
          r='5'>
  </circle>
  <circle
          filter='drop-shadow(2px, 4px, 0)'
          cx='10'
          cy='30'
          r='5'>
  </circle>
  <circle
          filter='drop-shadow(2px, 4px, 6px)'
          cx='20'
          cy='30'
          r='5'>
  </circle>
  <circle
          filter='drop-shadow(rgb(0,0,255), 2px, 4px, 6px)'
          cx='30'
          cy='30'
          r='5'>
  </circle>
  <circle
          filter='drop-shadow(rgb(255,0,0), 2px, 4px, 0)'
          cx='40'
          cy='30'
          r='5'>
  </circle>
  <circle
          filter='url(#myfilter)'
          cx='50'
          cy='30'
          r='5'>
  </circle>
  <rect
          filter='blur(2) grayscale(0.5) brightness(1.5)'
          x='0'
          y='50'
          width='20'
          height='20'>
  </rect>
  <rect
          filter='contrast(1.5) saturate(0.5) hue-rotate(45)'
          x='30'
          y='50'
          width='20'
          height='20'>
  </rect>
</svg>

<svg width="150" height="150" viewBox="0 0 150 150"
        gpa:version='1'
        gpa:state='0'>
  <rect x="10" y="10" width="20" height="20" fill="red">
    <animate attributeName="x" values="10;20" dur="4s"
        begin='gpa:states(1).begin'/>
    <animate attributeName="y" values="10;20" dur="4s"
        begin='gpa:states(0, 2 3)'
        end='4000s'/>
    <animate attributeName="width" values="10;20" dur="4s"
        begin='StateChange(1, all)'
        end='4000s'/>
    <animate attributeName="height" values="10;20" dur="4s"
        begin='StateChange(4 2, 1 2)'
        end='4000s'/>
  </rect>
</svg>

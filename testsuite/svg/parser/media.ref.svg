<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        width='64'
        height='64'>
  <style type='text/css'>
    @media (prefers-color-scheme: light) {
      rect { fill: yellow; }
    }
    @media not (prefers-color-scheme: light) {
      rect { fill: lightgreen; }
    }
  </style>
  <rect
          x='0'
          y='0'
          width='50%'
          height='50%'>
  </rect>
</svg>

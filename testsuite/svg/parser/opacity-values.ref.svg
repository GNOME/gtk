<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        width='100'
        height='100'>
  <rect
          opacity='0'
          fill='rgb(255,0,0)'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          opacity='1'
          fill='rgb(255,0,0)'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          opacity='0.5'
          fill='rgb(255,0,0)'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          fill='rgb(255,0,0)'
          fill-opacity='0'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          fill='rgb(255,0,0)'
          fill-opacity='0.25'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          fill='rgb(255,0,0)'
          stroke='rgb(0,0,255)'
          stroke-opacity='0'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          fill='rgb(255,0,0)'
          stroke='rgb(0,0,255)'
          stroke-opacity='0.75'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          fill='rgb(255,0,0)'
          stroke='rgb(0,0,255)'
          stroke-opacity='50%'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
  <rect
          opacity='0'
          fill='rgb(255,0,0)'
          fill-opacity='0.5'
          stroke-opacity='0.5'
          x='0'
          y='0'
          width='100'
          height='100'>
  </rect>
</svg>

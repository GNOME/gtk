<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        width='200'
        height='200'>
  <defs>
    <filter
            id='myfilter'>
      <feGaussianBlur
              stdDeviation='3'>
      </feGaussianBlur>
    </filter>
  </defs>
  <circle
          filter='drop-shadow(rgb(0,0,255), 2px, 4px, 0)'
          cx='10'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: drop-shadow(3px 5px 2px green)'
          cx='20'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: url(#myfilter)'
          cx='30'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: blur(2px) brightness(1.5)'
          cx='40'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: none'
          cx='50'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: blur(3px)'
          cx='60'
          cy='10'
          r='5'>
  </circle>
  <circle
          style='filter: hue-rotate(90deg)'
          cx='70'
          cy='10'
          r='5'>
  </circle>
  <rect
          style='filter: grayscale(50%) contrast(150%) saturate(200%)'
          x='0'
          y='30'
          width='20'
          height='20'>
  </rect>
  <rect
          style='filter: drop-shadow(1px 2px 3px red)'
          x='30'
          y='30'
          width='20'
          height='20'>
  </rect>
  <rect
          style='filter: opacity(75%)'
          x='60'
          y='30'
          width='20'
          height='20'>
  </rect>
  <rect
          style='filter: drop-shadow(1px 2px 3px 4x red)'
          x='30'
          y='30'
          width='20'
          height='20'>
  </rect>
  <rect
          style='filter: drop-shadow(1px)'
          x='30'
          y='30'
          width='20'
          height='20'>
  </rect>
</svg>

<svg
        xmlns='http://www.w3.org/2000/svg'
        width='100%'
        height='100%'
        viewBox='0 0 480 360'>
  <desc>
    Test that !important styles override animations.
  </desc>
  <style>
    rect.imp { fill: blue !important; }
    rect { fill: blue; }
  </style>
  <rect width='100%' height='50%' class='imp'>
    <animate attributeName='fill'
        values='red;green;red'
        dur='2s'
        repeatCount='indefinite'
        begin='0s'/>
  </rect>
  <rect y='50%' width='100%' height='50%'>
    <animate attributeName='fill'
        values='red;green;red'
        dur='2s'
        repeatCount='indefinite'
        begin='0s'/>
  </rect>
</svg>

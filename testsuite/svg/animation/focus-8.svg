<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='8000ms'
        id='toplevel'
        tabindex='-1'
        font-size='13.333'
        font-weight='400'
        width='64'
        height='64'>
  <style type='text/css'>
    rect { fill: yellow; }
    rect:focus { stroke: black; }
  </style>
  <rect
          id='rect1'
          tabindex='0'
          font-size='13.333'
          font-weight='400'
          fill='rgb(255,0,0)'
          stroke='rgb(0,0,0)'
          x='0'
          y='0'
          width='32px'
          height='32px'
          gpa:css-state='focused'>
    <animate
            attributeName='fill'
            begin='rect1.blur'
            dur='500ms'
            fill='freeze'
            from='rgb(255,0,0)'
            to='rgb(255,255,0)'
            keyTimes='0; 1'
            gpa:status='done'/>
    <animate
            attributeName='fill'
            begin='rect1.focus'
            dur='500ms'
            fill='freeze'
            from='rgb(255,255,0)'
            to='rgb(255,0,0)'
            keyTimes='0; 1'
            gpa:status='done'/>
  </rect>
  <g
          id='group'
          font-size='13.333'
          font-weight='400'>
    <a
            id='link'
            font-size='13.333'
            font-weight='400'
            href='http://www.gtk.org'
            gpa:css-state='link,visited'>
      <rect
              id='rect2'
              font-size='13.333'
              font-weight='400'
              fill='rgb(255,255,0)'
              x='32px'
              y='0'
              width='32px'
              height='32px'>
        <animate
                attributeName='fill'
                begin='link.focus'
                dur='500ms'
                fill='freeze'
                from='rgb(255,255,0)'
                to='rgb(144,238,144)'
                keyTimes='0; 1'
                gpa:status='done'/>
        <animate
                attributeName='fill'
                begin='link.blur'
                dur='500ms'
                fill='freeze'
                from='rgb(144,238,144)'
                to='rgb(255,255,0)'
                keyTimes='0; 1'
                gpa:status='done'/>
      </rect>
    </a>
    <rect
            id='rect3'
            tabindex='0'
            font-size='13.333'
            font-weight='400'
            fill='rgb(255,255,0)'
            x='0'
            y='32px'
            width='32px'
            height='32px'>
    </rect>
  </g>
  <rect
          id='rect4'
          tabindex='0'
          font-size='13.333'
          font-weight='400'
          fill='rgb(255,255,0)'
          x='32px'
          y='32px'
          width='32px'
          height='32px'>
  </rect>
</svg>

<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='0ms'
        font-size='13.333'
        font-weight='400'
        width='100'
        height='100'>
  <linearGradient
          id='rg'
          font-size='13.333'
          font-weight='400'>
    <stop
            offset='0'
            stop-color='rgb(255,0,0)'
            stop-opacity='1'>
    </stop>
    <stop
            offset='1'
            stop-color='rgb(0,128,0)'
            stop-opacity='1'>
    </stop>
  </linearGradient>
  <linearGradient
          id='yb'
          font-size='13.333'
          font-weight='400'>
    <stop
            offset='0'
            stop-color='rgb(255,255,0)'
            stop-opacity='1'>
    </stop>
    <stop
            offset='1'
            stop-color='rgb(0,0,255)'
            stop-opacity='1'>
    </stop>
  </linearGradient>
  <linearGradient
          id='gradient'
          font-size='13.333'
          font-weight='400'
          href='#rg'>
    <animate
            id='swapgradient'
            attributeName='href'
            begin='0ms'
            dur='1000ms'
            repeatCount='indefinite'
            from='#rg'
            to='#yb'
            keyTimes='0; 1'
            gpa:status='running'
            gpa:current-start-time='0ms'/>
  </linearGradient>
  <rect
          font-size='13.333'
          font-weight='400'
          fill='url(#gradient)'
          x='0px'
          y='0px'
          width='100px'
          height='100px'>
  </rect>
</svg>

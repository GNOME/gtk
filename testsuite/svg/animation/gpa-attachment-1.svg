<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='1000ms'
        gpa:time-since-load='500ms'
        gpa:next-update='500ms'
        gpa:run-mode='discrete'
        font-size='13.333'
        width='100'
        height='100'
        viewBox='0 0 100 100'>
  <path
          id='line'
          font-size='13.333'
          stroke='rgb(0,0,0)'
          stroke-dasharray='0 2'
          pathLength='1'
          d='M 10 10 L 90 90'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:line'
            attributeName='visibility'
            begin='StateChange(0, not 0); 0ms'
            end='StateChange(not 0, 0)'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-in:0:stroke-dasharray:line'
            attributeName='stroke-dasharray'
            begin='StateChange(not 0, 0)'
            dur='1000ms'
            repeatDur='1000ms'
            fill='freeze'
            from='0 2'
            to='1 0'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='done'
            gpa:current-start-time='1000ms'
            gpa:current-end-time='2000ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-out:0:stroke-dasharray:line'
            attributeName='stroke-dasharray'
            begin='StateChange(0, not 0) -1000ms'
            dur='1000ms'
            repeatDur='1000ms'
            fill='freeze'
            from='1 0'
            to='0 2'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:path-length:line'
            attributeName='pathLength'
            begin='0ms'
            end='indefinite'
            to='1'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
  </path>
  <circle
          id='red'
          font-size='13.333'
          transform='translate(90, 90) rotate(45, 0, 0) translate(-5, -5)'
          fill='rgb(255,0,0)'
          pathLength='1'
          cx='0'
          cy='5'
          r='5'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:red'
            attributeName='visibility'
            begin='StateChange(0, not 0); 0ms'
            end='StateChange(not 0, 0)'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animateMotion
            id='gpa:attachment:red'
            begin='0ms'
            end='0.001ms'
            dur='0.001ms'
            fill='freeze'
            keyTimes='0; 1'
            calcMode='linear'
            keyPoints='1; 1'
            rotate='auto'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'>
      <mpath href='#line'/>
    </animateMotion>
    <animateMotion
            id='gpa:attachment-transition:fade-in:red'
            begin='gpa:transition:fade-in:0:stroke-dasharray:line.begin'
            end='gpa:transition:fade-in:0:stroke-dasharray:line.end'
            dur='1000ms'
            fill='freeze'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            keyPoints='0; 1'
            rotate='auto'
            gpa:status='inactive'
            gpa:current-start-time='1000ms'
            gpa:current-end-time='2000ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='1000ms'>
      <mpath href='#line'/>
    </animateMotion>
    <animateMotion
            id='gpa:attachment-transition:fade-out:red'
            begin='gpa:transition:fade-out:0:stroke-dasharray:line.begin'
            end='gpa:transition:fade-out:0:stroke-dasharray:line.end'
            dur='1000ms'
            fill='freeze'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            keyPoints='1; 0'
            rotate='auto'
            gpa:status='inactive'
            gpa:run-mode='discrete'>
      <mpath href='#line'/>
    </animateMotion>
    <set
            id='gpa:path-length:red'
            attributeName='pathLength'
            begin='0ms'
            end='indefinite'
            to='1'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
  </circle>
</svg>

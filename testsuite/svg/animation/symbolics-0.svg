<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='1000ms'
        font-size='13.333'
        font-weight='400'
        width='64'
        height='64'
        viewBox='0 0 32 32'>
  <circle
          id='foreground'
          font-size='13.333'
          font-weight='400'
          fill='rgb(0,0,0)'
          cx='0'
          cy='5'
          r='5'
          gpa:fill='url(#gpa:foreground) rgb(0,0,0)'>
  </circle>
  <circle
          id='warning'
          font-size='13.333'
          font-weight='400'
          fill='rgb(255,255,0)'
          cx='10'
          cy='5'
          r='5'
          gpa:fill='url(#gpa:warning) rgb(245,121,0)'>
  </circle>
  <circle
          id='blue'
          font-size='13.333'
          font-weight='400'
          fill='rgb(0,0,255)'
          cx='20'
          cy='5'
          r='5'>
  </circle>
</svg>

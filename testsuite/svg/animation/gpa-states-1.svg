<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='1500ms'
        gpa:run-mode='discrete'
        font-size='13.333'
        width='64'
        height='64'
        viewBox='0 0 32 32'>
  <circle
          id='red'
          font-size='13.333'
          fill='rgb(255,0,0)'
          cx='0'
          cy='5'
          r='5'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:red'
            attributeName='visibility'
            begin='StateChange(0, not 0); 0ms'
            end='StateChange(not 0, 0)'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='1000ms'/>
  </circle>
  <circle
          id='yellow'
          font-size='13.333'
          visibility='hidden'
          fill='rgb(255,255,0)'
          cx='10'
          cy='5'
          r='5'
          gpa:states='1'>
    <set
            id='gpa:out-of-state:yellow'
            attributeName='visibility'
            begin='StateChange(1, not 1); 0ms'
            end='StateChange(not 1, 1)'
            to='hidden'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='1000ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='1000ms'/>
  </circle>
  <circle
          id='blue'
          font-size='13.333'
          fill='rgb(0,0,255)'
          cx='20'
          cy='5'
          r='5'
          gpa:states='0 1'>
    <set
            id='gpa:out-of-state:blue'
            attributeName='visibility'
            begin='StateChange(0 1, not 0 1); 0ms'
            end='StateChange(not 0 1, 0 1)'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='1000ms'/>
  </circle>
</svg>

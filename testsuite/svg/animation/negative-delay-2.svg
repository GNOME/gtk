<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='1'
        gpa:state-change-delay='250ms'
        gpa:time-since-load='250ms'
        gpa:next-update='250ms'
        gpa:run-mode='continuous'
        font-size='13.333'
        width='100'
        height='100'>
  <path
          id='line1'
          font-size='13.333'
          visibility='hidden'
          fill='none'
          stroke='rgb(0,0,0)'
          stroke-width='2'
          stroke-linecap='round'
          stroke-linejoin='round'
          stroke-dasharray='0.5 1'
          pathLength='1'
          d='M 0 0 L 100 100'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:line1'
            attributeName='visibility'
            begin='StateChange(0, not 0) 250ms'
            end='StateChange(not 0, 0) -250ms'
            to='hidden'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='500ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='500ms'/>
    <animate
            id='gpa:transition:fade-in:0:stroke-dasharray:line1'
            attributeName='stroke-dasharray'
            begin='StateChange(not 0, 0) -250ms'
            dur='500ms'
            repeatDur='500ms'
            fill='freeze'
            from='0 2'
            to='1 0'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-out:0:stroke-dasharray:line1'
            attributeName='stroke-dasharray'
            begin='StateChange(0, not 0) -250ms'
            dur='500ms'
            repeatDur='500ms'
            fill='freeze'
            from='1 0'
            to='0 2'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='running'
            gpa:current-start-time='0ms'
            gpa:current-end-time='500ms'
            gpa:run-mode='continuous'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:transition:fade-in-delay:stroke-dashoffset:line1'
            attributeName='stroke-dashoffset'
            begin='StateChange(not 0, 0)'
            dur='-250ms'
            repeatDur='-250ms'
            to='0.5'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:transition:fade-out-delay:stroke-dashoffset:line1'
            attributeName='stroke-dashoffset'
            begin='StateChange(0, not 0) 250ms'
            dur='-250ms'
            repeatDur='-250ms'
            to='0.5'
            gpa:status='done'
            gpa:current-start-time='500ms'
            gpa:current-end-time='250ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:path-length:line1'
            attributeName='pathLength'
            begin='0ms'
            end='indefinite'
            to='1'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
  </path>
  <path
          id='line2'
          font-size='13.333'
          fill='none'
          stroke='rgb(0,0,0)'
          stroke-width='2'
          stroke-linecap='round'
          stroke-linejoin='round'
          stroke-dasharray='0 2'
          pathLength='1'
          d='M 100 0 L 0 100'
          gpa:states='1'>
    <set
            id='gpa:out-of-state:line2'
            attributeName='visibility'
            begin='StateChange(1, not 1) 250ms; 0ms'
            end='StateChange(not 1, 1) -250ms'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-in:0:stroke-dasharray:line2'
            attributeName='stroke-dasharray'
            begin='StateChange(not 1, 1) -250ms'
            dur='500ms'
            repeatDur='500ms'
            fill='freeze'
            from='0 2'
            to='1 0'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='running'
            gpa:current-start-time='0ms'
            gpa:current-end-time='500ms'
            gpa:run-mode='continuous'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-out:0:stroke-dasharray:line2'
            attributeName='stroke-dasharray'
            begin='StateChange(1, not 1) -250ms'
            dur='500ms'
            repeatDur='500ms'
            fill='freeze'
            from='1 0'
            to='0 2'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:transition:fade-in-delay:stroke-dashoffset:line2'
            attributeName='stroke-dashoffset'
            begin='StateChange(not 1, 1)'
            dur='-250ms'
            repeatDur='-250ms'
            to='0.5'
            gpa:status='done'
            gpa:current-start-time='250ms'
            gpa:current-end-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:transition:fade-out-delay:stroke-dashoffset:line2'
            attributeName='stroke-dashoffset'
            begin='StateChange(1, not 1) 250ms'
            dur='-250ms'
            repeatDur='-250ms'
            to='0.5'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:path-length:line2'
            attributeName='pathLength'
            begin='0ms'
            end='indefinite'
            to='1'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
  </path>
</svg>

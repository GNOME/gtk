<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='11000ms'
        gpa:next-update='11000ms'
        gpa:run-mode='stopped'
        font-size='13.333'
        width='100'
        height='100'
        viewBox='0 0 100 100'>
  <circle
          font-size='13.333'
          opacity='0'
          stroke='rgb(255,0,0)'
          cx='50'
          cy='50'
          r='10'>
    <animate
            id='fade-in'
            attributeName='opacity'
            begin='0ms'
            dur='1000ms'
            fill='freeze'
            from='0'
            to='1'
            keyTimes='0; 1'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='fade-out'
            attributeName='opacity'
            begin='10000ms'
            dur='1000ms'
            fill='freeze'
            from='1'
            to='0'
            keyTimes='0; 1'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='10000ms'/>
  </circle>
</svg>

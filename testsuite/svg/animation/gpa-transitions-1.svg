<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='0'
        gpa:state-change-delay='2000ms'
        gpa:time-since-load='2000ms'
        gpa:next-update='2000ms'
        gpa:run-mode='continuous'
        font-size='13.333'
        width='64'
        height='64'
        viewBox='0 0 32 32'>
  <circle
          id='red'
          font-size='13.333'
          opacity='0'
          fill='rgb(255,0,0)'
          cx='0'
          cy='5'
          r='5'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:red'
            attributeName='visibility'
            begin='StateChange(0, not 0); 0ms'
            end='StateChange(not 0, 0)'
            to='hidden'
            gpa:status='done'
            gpa:computed-simple-duration='indefinite'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-out:0:opacity:red'
            attributeName='opacity'
            begin='StateChange(0, not 0) -2000ms'
            dur='2000ms'
            repeatDur='2000ms'
            fill='freeze'
            from='1'
            to='0'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <animate
            id='gpa:transition:fade-in:0:opacity:red'
            attributeName='opacity'
            begin='StateChange(not 0, 0)'
            dur='2000ms'
            repeatDur='2000ms'
            fill='freeze'
            from='0'
            to='1'
            keySplines='0 0 1 1'
            keyTimes='0; 1'
            calcMode='spline'
            gpa:status='running'
            gpa:current-start-time='2000ms'
            gpa:current-end-time='4000ms'
            gpa:run-mode='continuous'
            gpa:last-start-time='2000ms'/>
  </circle>
</svg>

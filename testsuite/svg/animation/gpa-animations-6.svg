<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state='63'
        gpa:state-change-delay='0ms'
        gpa:time-since-load='4000ms'
        gpa:run-mode='discrete'
        font-size='13.333'
        font-weight='400'
        width='64'
        height='64'
        viewBox='0 0 32 32'>
  <circle
          id='red'
          font-size='13.333'
          visibility='hidden'
          font-weight='400'
          fill='none'
          stroke='rgb(255,0,0)'
          pathLength='1'
          cx='16'
          cy='16'
          r='5'
          gpa:states='0'>
    <set
            id='gpa:out-of-state:red'
            attributeName='visibility'
            begin='StateChange(0, not 0); 0ms'
            end='StateChange(not 0, 0)'
            to='hidden'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='3500ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='3500ms'/>
    <animate
            id='gpa:animation:red-stroke-dasharray'
            attributeName='stroke-dasharray'
            begin='StateChange(not 0, 0)'
            end='StateChange(0, not 0)'
            dur='2000ms'
            repeatCount='indefinite'
            from='0 2'
            to='1 0'
            keyTimes='0; 1'
            gpa:status='done'
            gpa:run-mode='stopped'
            gpa:last-start-time='0ms'/>
    <set
            id='gpa:path-length:red'
            attributeName='pathLength'
            begin='0ms'
            end='indefinite'
            to='1'
            gpa:status='running'
            gpa:computed-simple-duration='indefinite'
            gpa:current-start-time='0ms'
            gpa:run-mode='discrete'
            gpa:last-start-time='0ms'/>
  </circle>
</svg>
